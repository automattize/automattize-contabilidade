kind = "web"
previewPath = "/"
title = "Automattize Contabilidade"
version = "1.0.0"
id = "artifacts/automattize-contabilidade"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23006
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/automattize-contabilidade run dev"

[services.env]
PORT = "23006"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/automattize-contabilidade", "run", "build"]
publicDir = "artifacts/automattize-contabilidade/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
